<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanshuf - BAC Calculator</title>
    <style>
        :root {
            --primary: #f0a500;
            --bg: #121212;
            --cream: #F5F5DC;
            --muted: #F5F5DC99;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .card {
            max-width: 420px;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .sub-he {
            color: var(--muted);
            font-size: 18px;
            margin-bottom: 8px;
        }
        .sub-en {
            color: var(--muted);
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🍺</div>
        <h1>Yanshuf</h1>
        <p class="sub-he">מחשבון רמת אלכוהול בדם</p>
        <p class="sub-en">BAC Calculator</p>
    </div>
</body>
</html>
